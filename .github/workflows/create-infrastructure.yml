name: Terraform Deploy (AWS Infrastructure)

on:
    workflow_dispatch:
        inputs:
            action:
                description: "Choose action to perform"
                required: true
                default: "plan"
                type: choice
                options:
                    - plan
                    - apply
                    - destroy
            auto_approve:
                description: "Auto approve apply? (Only used with Apply)"
                required: false
                default: false
                type: boolean

permissions:
    contents: read

jobs:
    terraform:
        name: Terraform ${{ inputs.action }}
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Setup Terraform
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: "1.10.x"

            # Configure AWS Credentials
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: eu-central-1

            # Terraform Init
            - name: Terraform Init
              run: terraform init
              working-directory: terraform

            # Terraform Validate & Format
            - name: Terraform Validate
              run: terraform validate
              working-directory: terraform

            - name: Terraform Format Check
              run: terraform fmt -check
              working-directory: terraform

            # Terraform Plan
            - name: Terraform Plan
              if: inputs.action == 'plan' || inputs.action == 'apply'
              run: terraform plan -out=plan.tfplan
              working-directory: terraform

            # Terraform Apply (Only if user chooses Apply)
            - name: Terraform Apply
              if: inputs.action == 'apply'
              run: terraform apply -auto-approve plan.tfplan
              working-directory: terraform
              env:
                  TF_IN_AUTOMATION: true

            # Show EC2 Public IP after Apply
            - name: Show EC2 Public IP
              if: inputs.action == 'apply'
              run: |
                  echo "Deployment Completed!"
              working-directory: terraform

            # Terraform destroy (Only if user chooses destroy)
            - name: Terraform Destroy
              if: inputs.auto_approve == true
              run: terraform apply -auto-approve destroy.tfplan
              working-directory: terraform
