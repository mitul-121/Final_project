- name: Clone or pull latest code from Github
  git:
    repo: "{{ git_repo }}"
    dest: /opt/{{ app_name }}
    version: "{{  git_branch  }}"
    force: yes
    update: yes
  become: true

- name: Create .env file from secure template
  template:
    src: .env.j2
    dest: /opt/{{ app_name }}/.env
    mode: '0600'
  become: true

- name: Deploy docker-compose.yml from template
  template:
    src: docker-compose.yml.j2
    dest: /opt/{{ app_name }}/docker-compose.yml
    mode: '0644'
  become: true

- name: Start application with Docker Compose
  command: docker-compose -f /opt/{{ app_name }}/docker-compose.yml up -d --build --force-recreate
  args:
    chdir: /opt/{{ app_name }}
  become: true
  environment:
    DOCKER_BUILDKIT: "0"

- name: wait for app to be healthy
  wait_for:
    host: "http://localhost"
    port: 8080
    status_code: 200
    timeout: 30
  register: health_check
  retries: 12
  delay: 10
  until: health_check.status == 200
